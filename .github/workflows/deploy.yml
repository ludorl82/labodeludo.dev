name: Deploy

on:
  push:

jobs:
  deploy-staging:
    if: github.ref != 'refs/heads/main'
    runs-on: [self-hosted, k3s]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
      - name: Install kubectl
        run: |
          curl -sLO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
      - name: Deploy to k3s
        run: |
          POD=$(./kubectl get pod -n labodeludo -l app=dev-labodeludo -o jsonpath='{.items[0].metadata.name}')
          ./kubectl exec -n labodeludo "$POD" -- sh -c 'rm -rf /usr/share/nginx/html/* /usr/share/nginx/html/.[!.]* 2>/dev/null || true'
          ./kubectl cp dist/. "labodeludo/$POD:/usr/share/nginx/html"

  deploy-prod:
    if: github.ref == 'refs/heads/main'
    runs-on: [self-hosted, k3s]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
      - env:
          AWS_ACCESS_KEY_ID: ${{ secrets.LABODELUDO_S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.LABODELUDO_S3_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: aws s3 sync dist/ s3://labodeludo.dev/ --delete
      - env:
          AWS_ACCESS_KEY_ID: ${{ secrets.LABODELUDO_S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.LABODELUDO_S3_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: bash scripts/redirect-old-urls.sh
