<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 320" font-family="Helvetica, Arial, sans-serif" role="img" aria-label="Illustration: a terminal console running in a tmux session on the bastion, controlled remotely from a phone, with a crescent moon symbolizing unsupervised nighttime tasks"><defs><linearGradient id="bghben" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#16213a"></stop><stop offset="100%" stop-color="#1f3f6e"></stop></linearGradient></defs><rect x="0" y="0" width="1024" height="320" fill="url(#bghben)"></rect><g fill="#ffffff" opacity="0.05"><ellipse cx="140" cy="55" rx="120" ry="38"></ellipse><ellipse cx="900" cy="60" rx="150" ry="40"></ellipse></g><text x="512" y="52" text-anchor="middle" font-size="30" fill="#ffffff" font-weight="bold">Claude Code in headless mode</text><g transform="translate(150,180)"><rect x="-45" y="-70" width="90" height="150" rx="14" fill="#0d1b2a" stroke="#ffb3ea" stroke-width="2.5"></rect><rect x="-33" y="-52" width="66" height="96" rx="4" fill="#152238"></rect><circle cx="0" cy="62" r="7" fill="#ffb3ea"></circle><text x="0" y="-8" text-anchor="middle" font-size="10" fill="#ffb3ea">remote</text><text x="0" y="8" text-anchor="middle" font-size="10" fill="#ffb3ea">control</text></g><g stroke="#8fe3b0" stroke-width="3" stroke-dasharray="6 5"><line x1="205" y1="175" x2="345" y2="160"></line></g><g transform="translate(512,175)"><rect x="-170" y="-85" width="340" height="170" rx="12" fill="#101c30" stroke="#8fe3b0" stroke-width="2"></rect><rect x="-170" y="-85" width="340" height="26" rx="12" fill="#1b2a44"></rect><circle cx="-150" cy="-72" r="5" fill="#ff8a8a"></circle><circle cx="-132" cy="-72" r="5" fill="#ffd98a"></circle><circle cx="-114" cy="-72" r="5" fill="#8fe3b0"></circle><text x="0" y="-68" text-anchor="middle" font-size="11" fill="#a9c0e0">bastion — tmux</text><text x="-150" y="-25" font-size="13" fill="#8fe3b0" font-family="monospace">$ claude --headless</text><text x="-150" y="0" font-size="13" fill="#d8f5e2" font-family="monospace">&gt; system upgrade... ok</text><text x="-150" y="25" font-size="13" fill="#d8f5e2" font-family="monospace">&gt; backups... ok</text><text x="-150" y="50" font-size="13" fill="#5ec2ff" font-family="monospace">&gt; _</text></g><g stroke="#8fe3b0" stroke-width="3" stroke-dasharray="6 5"><line x1="682" y1="160" x2="820" y2="140"></line></g><g transform="translate(880,120)"><path d="M15,-25 A28,28 0 1 0 15,25 A22,22 0 1 1 15,-25 Z" fill="#ffd98a"></path><circle cx="-8" cy="-15" r="2.5" fill="#ffffff" opacity="0.8"></circle><circle cx="-18" cy="5" r="2" fill="#ffffff" opacity="0.6"></circle><circle cx="-5" cy="18" r="1.8" fill="#ffffff" opacity="0.7"></circle></g><text x="512" y="290" text-anchor="middle" font-size="17" fill="#ffffff" font-weight="bold" opacity="0.9">backups and upgrades, unsupervised, every night</text></svg>
