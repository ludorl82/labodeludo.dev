<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 320" font-family="Helvetica, Arial, sans-serif" role="img" aria-label="Illustration : trois nœuds de plan de contrôle, deux dans le nuage et un à la maison, dont deux disparaissent au profit d'un seul nœud infonuagique agrandi"><defs><linearGradient id="bgcp" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2a1f3d"></stop><stop offset="100%" stop-color="#1f3f6e"></stop></linearGradient></defs><rect x="0" y="0" width="1024" height="320" fill="url(#bgcp)"></rect><g fill="#ffffff" opacity="0.05"><ellipse cx="150" cy="60" rx="130" ry="40"></ellipse><ellipse cx="890" cy="70" rx="150" ry="42"></ellipse></g><text x="512" y="48" text-anchor="middle" font-size="26" fill="#ffffff" font-weight="bold">Consolider un plan de contrôle k3s</text>

<g transform="translate(190,150)" opacity="0.4"><rect x="-80" y="-30" width="160" height="60" rx="10" fill="#4a4a5a" stroke="#ff6b6b" stroke-width="2" stroke-dasharray="5 4"></rect><text x="0" y="-4" text-anchor="middle" font-size="12" fill="#ffd1d1" font-weight="bold">nuage (fragile)</text><text x="0" y="16" text-anchor="middle" font-size="11" fill="#ffd1d1">retiré</text></g>

<g transform="translate(390,150)" opacity="0.4"><rect x="-75" y="-30" width="150" height="60" rx="10" fill="#4a4a5a" stroke="#ff6b6b" stroke-width="2" stroke-dasharray="5 4"></rect><text x="0" y="-4" text-anchor="middle" font-size="12" fill="#ffd1d1" font-weight="bold">maison</text><text x="0" y="16" text-anchor="middle" font-size="11" fill="#ffd1d1">retiré</text></g>

<g stroke="#ffb3ea" stroke-width="3" fill="none" marker-end="url(#arrow)"><path d="M 500 150 L 700 150"></path></g>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#ffb3ea"></path></marker></defs>

<g transform="translate(850,150)"><rect x="-115" y="-46" width="230" height="92" rx="10" fill="#0d1b2a" stroke="#8fe3b0" stroke-width="2"></rect><text x="0" y="-18" text-anchor="middle" font-size="12" fill="#8fe3b0" font-weight="bold">nuage, agrandi</text><text x="0" y="2" text-anchor="middle" font-size="20" fill="#ffffff">💪</text><text x="0" y="26" text-anchor="middle" font-size="11" fill="#d8f5e2">seul votant, bien nourri</text></g>

<text x="512" y="295" text-anchor="middle" font-size="16" fill="#ffffff" font-weight="bold" opacity="0.9">trois votants dont un fragile ne valent pas plus qu'un seul bien nourri</text>
</svg>
