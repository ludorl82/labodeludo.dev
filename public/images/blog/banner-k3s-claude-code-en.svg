<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 320" font-family="Helvetica, Arial, sans-serif" role="img" aria-label="Illustration: several small server nodes linked in a cluster, one in a cloud, the others at home, around a terminal console"><defs><linearGradient id="bgk3sen" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#132a2e"></stop><stop offset="100%" stop-color="#1f3f6e"></stop></linearGradient><linearGradient id="nodek3sen" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#8fe3b0"></stop><stop offset="100%" stop-color="#5ec2ff"></stop></linearGradient></defs><rect x="0" y="0" width="1024" height="320" fill="url(#bgk3sen)"></rect><g fill="#ffffff" opacity="0.05"><ellipse cx="150" cy="60" rx="130" ry="40"></ellipse><ellipse cx="890" cy="70" rx="150" ry="42"></ellipse></g><text x="512" y="52" text-anchor="middle" font-size="34" fill="#ffffff" font-weight="bold">Building a k3s cluster for the lab</text><g transform="translate(180,90)"><ellipse cx="0" cy="0" rx="95" ry="34" fill="#ffffff" opacity="0.92"></ellipse><text x="0" y="-3" text-anchor="middle" font-size="13" fill="#173047" font-weight="bold">control plane</text><text x="0" y="14" text-anchor="middle" font-size="11" fill="#173047">(cloud)</text></g><g stroke="#8fe3b0" stroke-width="3" stroke-dasharray="6 5"><line x1="180" y1="124" x2="330" y2="205"></line><line x1="180" y1="124" x2="512" y2="215"></line><line x1="180" y1="124" x2="694" y2="205"></line></g><g transform="translate(330,225)"><rect x="-60" y="-30" width="120" height="60" rx="10" fill="url(#nodek3sen)"></rect><text x="0" y="4" text-anchor="middle" font-size="13" fill="#0d2a1f" font-weight="bold">node</text></g><g transform="translate(512,235)"><rect x="-60" y="-30" width="120" height="60" rx="10" fill="url(#nodek3sen)"></rect><text x="0" y="4" text-anchor="middle" font-size="13" fill="#0d2a1f" font-weight="bold">node</text></g><g transform="translate(694,225)"><rect x="-60" y="-30" width="120" height="60" rx="10" fill="url(#nodek3sen)"></rect><text x="0" y="4" text-anchor="middle" font-size="13" fill="#0d2a1f" font-weight="bold">node</text></g><g transform="translate(880,150)"><rect x="-70" y="-38" width="140" height="76" rx="8" fill="#0d1b2a" stroke="#ffb3ea" stroke-width="2"></rect><text x="0" y="-10" text-anchor="middle" font-size="11" fill="#ffb3ea" font-weight="bold">console</text><text x="0" y="6" text-anchor="middle" font-size="10" fill="#d8f5e2">kubectl</text><text x="0" y="22" text-anchor="middle" font-size="10" fill="#d8f5e2">&gt; _</text></g><text x="512" y="295" text-anchor="middle" font-size="18" fill="#ffffff" font-weight="bold" opacity="0.9">a single host becomes six nodes</text></svg>
