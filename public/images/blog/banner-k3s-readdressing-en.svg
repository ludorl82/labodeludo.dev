<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 320" font-family="Helvetica, Arial, sans-serif" role="img" aria-label="Illustration: two servers swapping their IP addresses, with a third address marked with a lock, unreachable, next to a new machine taking its place"><defs><linearGradient id="bgrb" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#132a2e"></stop><stop offset="100%" stop-color="#1f3f6e"></stop></linearGradient><linearGradient id="noderb" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#8fe3b0"></stop><stop offset="100%" stop-color="#5ec2ff"></stop></linearGradient></defs><rect x="0" y="0" width="1024" height="320" fill="url(#bgrb)"></rect><g fill="#ffffff" opacity="0.05"><ellipse cx="150" cy="60" rx="130" ry="40"></ellipse><ellipse cx="890" cy="70" rx="150" ry="42"></ellipse></g><text x="512" y="48" text-anchor="middle" font-size="30" fill="#ffffff" font-weight="bold">Renumbering a k3s cluster's IP addresses</text>

<g transform="translate(190,150)"><rect x="-85" y="-34" width="170" height="68" rx="10" fill="url(#noderb)"></rect><text x="0" y="-6" text-anchor="middle" font-size="13" fill="#0d2a1f" font-weight="bold">node A</text><text x="0" y="14" text-anchor="middle" font-size="12" fill="#0d2a1f" font-family="'Courier New', monospace">.130 → .131</text></g>

<g stroke="#ffb3ea" stroke-width="3" fill="none"><path d="M 300 130 Q 360 90 420 130" marker-end="url(#arrowb)"></path><path d="M 420 172 Q 360 210 300 172" marker-end="url(#arrowb)"></path></g>
<defs><marker id="arrowb" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#ffb3ea"></path></marker></defs>

<g transform="translate(530,150)"><rect x="-85" y="-34" width="170" height="68" rx="10" fill="url(#noderb)"></rect><text x="0" y="-6" text-anchor="middle" font-size="13" fill="#0d2a1f" font-weight="bold">node B</text><text x="0" y="14" text-anchor="middle" font-size="12" fill="#0d2a1f" font-family="'Courier New', monospace">.131 → .140</text></g>

<g transform="translate(850,150)"><rect x="-115" y="-42" width="230" height="84" rx="10" fill="#0d1b2a" stroke="#ffd166" stroke-width="2" stroke-dasharray="5 4"></rect><text x="0" y="-14" text-anchor="middle" font-size="12" fill="#ffd166" font-weight="bold">control plane</text><text x="0" y="4" text-anchor="middle" font-size="16" fill="#ffffff">🔒</text><text x="0" y="26" text-anchor="middle" font-size="11" fill="#d8f5e2">address frozen — rebuild required</text></g>

<text x="512" y="295" text-anchor="middle" font-size="17" fill="#ffffff" font-weight="bold" opacity="0.9">what a simple address change taught me</text>
</svg>
